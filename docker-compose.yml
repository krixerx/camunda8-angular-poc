# Local dev/POC stack — Camunda 8.9 orchestration cluster (Zeebe + Operate + Tasklist,
# H2 secondary storage, no Elasticsearch) + connectors runtime.
# Adapted from the official lightweight distribution:
# https://github.com/camunda/camunda-distributions (docker-compose-8.9)
services:
  keycloak:
    # Identity provider. Dev mode + realm auto-import; realm `camunda-poc`
    # ships demo users bart/bart (applicant) and homer/homer (civil-servant).
    # KC_HOSTNAME_URL pins one canonical issuer (http://localhost:8180) so
    # tokens carry the same `iss` for the browser and for containers — the
    # backend fetches JWKS via internal DNS but validates the issuer claim
    # against this public URL.
    image: quay.io/keycloak/keycloak:26.1
    container_name: keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_URL: http://localhost:8180
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8180:8080"
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    mem_limit: 768m
    restart: unless-stopped
    # KC_HEALTH_ENABLED exposes /health/* on the management port (9000 in
    # Keycloak 26+); a TCP probe is enough — once 9000 listens, early init
    # and realm import have at least started.
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && exit 0 || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 60
      start_period: 20s
    networks:
      - camunda

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8085:8085" # dev convenience (curl against the API); frontend uses internal DNS
    environment:
      - CAMUNDA_GRPC_ADDRESS=http://orchestration:26500
      - CAMUNDA_REST_ADDRESS=http://orchestration:8080
      # JWKS fetched via internal DNS; issuer stays the canonical public URL
      - KEYCLOAK_JWKS_URI=http://keycloak:8080/realms/camunda-poc/protocol/openid-connect/certs
    mem_limit: 768m
    restart: unless-stopped
    networks:
      - camunda
    depends_on:
      orchestration:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - camunda
    depends_on:
      - backend

  camunda-data-init:
    image: camunda/camunda:${CAMUNDA_VERSION}
    user: "0:0"
    entrypoint: ["/bin/sh", "-c", "chown -R 1001:1001 /usr/local/camunda/camunda-data && chmod 775 /usr/local/camunda/camunda-data"]
    volumes:
      - camunda-data:/usr/local/camunda/camunda-data
    restart: "no"

  orchestration: # consolidated Zeebe + Operate + Tasklist + Identity
    image: camunda/camunda:${CAMUNDA_VERSION}
    container_name: orchestration
    ports:
      - "26500:26500" # Zeebe gRPC gateway
      - "8080:8080"   # REST API v2 + /operate + /tasklist UIs
      - "9600:9600"   # management/actuator
    mem_limit: 1g
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9600 && echo -e \"GET /actuator/health/status HTTP/1.1\r\nHost: localhost\r\n\r\n\" >&3 && head -n 1 <&3'"]
      interval: 1s
      retries: 30
      start_period: 30s
    volumes:
      - camunda:/usr/local/camunda/data
      - camunda-data:/usr/local/camunda/camunda-data
    configs:
      - source: orchestration-config
        target: /usr/local/camunda/config/application.yaml
    networks:
      - camunda
    depends_on:
      camunda-data-init:
        condition: service_completed_successfully

  connectors:
    image: camunda/connectors-bundle:${CAMUNDA_CONNECTORS_VERSION}
    container_name: connectors
    ports:
      - "8086:8080"
    environment:
      - management.endpoints.web.exposure.include=health,configprops
      - management.endpoint.health.probes.enabled=true
    mem_limit: 512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health/readiness"]
      interval: 30s
      timeout: 1s
      retries: 5
      start_period: 30s
    configs:
      - source: connectors-config
        target: application.yaml
    networks:
      - camunda
    depends_on:
      orchestration:
        condition: service_healthy

volumes:
  camunda:
  camunda-data:

networks:
  camunda:
    name: camunda

configs:
  connectors-config:
    content: |
      camunda:
        client:
          mode: self-managed
          grpc-address: http://orchestration:26500
          rest-address: http://orchestration:8080

  orchestration-config:
    file: ./docker/camunda/${ORCHESTRATION_CONFIG_FILE:-application-h2.yaml}
